<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 100px;">
        <div class="dashboard-grid">
            <aside class="sidebar-nav">
                <ul>
                    <li><a href="dashboard-orders.html">My Orders</a></li>
                    <li><a href="dashboard-wishlist.html">Wishlist</a></li>
                    <li><a href="dashboard-address.html">Shipping Address</a></li>
                    <li class="active"><a href="dashboard-settings.html">Account Settings</a></li>
                </ul>
            </aside>

            <div class="dashboard-content">
                <div class="dashboard-header">
                    <h2>Account Settings</h2>
                </div>
                
                <form id="settingsForm" class="form-container" style="margin: 0; max-width: 600px; background: transparent; border: none; padding: 0;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="userName" placeholder="Your Name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="userEmail" placeholder="Your Email" disabled style="opacity: 0.6; cursor: not-allowed;">
                        <small style="color: var(--text-muted);">Email cannot be changed.</small>
                    </div>
                    <div class="form-group">
                        <label>New Password</label>
                        <input type="password" id="newPass" placeholder="Enter new password">
                    </div>
                    <div class="form-group">
                        <label>Confirm New Password</label>
                        <input type="password" id="confirmPass" placeholder="Confirm new password">
                    </div>
                    <button type="submit" class="cta-button" style="width: auto;">Update Profile</button>
                </form>

                <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--glass);">
                    <h3 style="color: #ff4757; margin-bottom: 15px;">Danger Zone</h3>
                    <p style="color: var(--text-muted); margin-bottom: 15px;">Once you delete your account, there is no going back. Please be certain.</p>
                    <button onclick="deleteAccount()" class="cta-button" style="background: transparent; border-color: #ff4757; color: #ff4757;">Delete Account</button>
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 50px;">
        <div class="footer-bottom">
            &copy; 2026 YJ Menswear. All Rights Reserved.
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('currentUser')) || {};
            document.getElementById('userName').value = user.name || '';
            document.getElementById('userEmail').value = user.email || '';

            document.getElementById('settingsForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const newName = document.getElementById('userName').value;
                const newPass = document.getElementById('newPass').value;
                const confirmPass = document.getElementById('confirmPass').value;

                if (newPass && newPass !== confirmPass) {
                    alert('Passwords do not match!');
                    return;
                }

                // First pull latest users to prevent overwriting cloud
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                try {
                    if (typeof getData !== 'undefined') {
                        const fbUsers = await getData('users');
                        if (fbUsers) {
                            const fbArray = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                            users = fbArray.filter(u => u && u.email);
                        }
                    }
                } catch(err) {}

                const userIndex = users.findIndex(u => u.email === user.email);
                
                if (userIndex !== -1) {
                    users[userIndex].name = newName;
                    if (newPass) users[userIndex].password = newPass;
                    
                    localStorage.setItem('users', JSON.stringify(users));
                    
                    // Update current session
                    user.name = newName;
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    
                    // Sync to Cloud
                    try {
                        if (typeof syncData !== 'undefined') {
                            await syncData('users', users);
                        }
                    } catch(err) {}
                    
                    alert('Password and profile updated securely in the cloud!');
                    document.getElementById('newPass').value = '';
                    document.getElementById('confirmPass').value = '';
                } else {
                    alert('User not found.');
                }
            });
        });

        async function deleteAccount() {
            if (confirm('Are you sure you want to delete your account? This action cannot be undone.')) {
                const user = JSON.parse(localStorage.getItem('currentUser'));
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                
                try {
                    if (typeof getData !== 'undefined') {
                        const fbUsers = await getData('users');
                        if (fbUsers) {
                            const fbArray = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                            users = fbArray.filter(u => u && u.email);
                        }
                    }
                } catch(err) {}

                users = users.filter(u => u.email !== user.email);
                localStorage.setItem('users', JSON.stringify(users));
                
                try {
                    if (typeof syncData !== 'undefined') {
                        await syncData('users', users);
                    }
                } catch(err) {}

                logout();
            }
        }

        // Global logout will be used from script.js
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="dashboard-grid">
            <aside class="sidebar-nav">
                <ul>
                    <li><a href="dashboard-orders.html">My Orders</a></li>
                    <li class="active"><a href="dashboard-settings.html">Account Settings</a></li>
                    <li><a href="dashboard-address.html">Shipping Address</a></li>
                    <li><a href="dashboard-wishlist.html">Wishlist</a></li>
                </ul>
            </aside>
            <div class="dashboard-content">
                <div style="background: var(--bg-card); padding: 30px; border: 1px solid var(--glass);">
                    <h3 style="margin-bottom: 20px; color: var(--primary);">Update Profile</h3>
                    <form id="settingsForm">
                        <div class="form-group"><label>Full Name</label><input type="text" id="setName" required></div>
                        <div class="form-group"><label>Email Address</label><input type="email" id="setEmail" required></div>
                        <button type="submit" class="cta-button">Save Profile</button>
                    </form>
                    <div style="margin: 40px 0; border-top: 1px solid var(--glass);"></div>
                    <h3 style="margin-bottom: 20px; color: var(--primary);">Security</h3>
                    <form id="passwordForm">
                        <div class="form-group"><label>New Password</label><input type="password" id="newPassword" required></div>
                        <div style="display: flex; justify-content: space-between;">
                            <button type="submit" class="cta-button">Change Password</button>
                            <a href="#" onclick="forgotPassword()" style="color: var(--primary); font-size: 0.8rem;">Forgot Password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        function forgotPassword() {
            window.location.href = "mailto:yashshah2140@gmail.com?subject=Password%20Reset";
        }
        const user = JSON.parse(localStorage.getItem('registeredUser'));
        if (user) { document.getElementById('setName').value = user.name; document.getElementById('setEmail').value = user.email; }
        document.getElementById('settingsForm').addEventListener('submit', (e) => {
            e.preventDefault();
            user.name = document.getElementById('setName').value;
            user.email = document.getElementById('setEmail').value;
            localStorage.setItem('registeredUser', JSON.stringify(user));
            alert("Profile updated!");
        });
    </script>
</body>
</html>

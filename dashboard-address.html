<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Address | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="dashboard-grid">
            <aside class="sidebar-nav">
                <ul>
                    <li><a href="dashboard-orders.html">My Orders</a></li>
                    <li><a href="dashboard-settings.html">Account Settings</a></li>
                    <li class="active"><a href="dashboard-address.html">Shipping Address</a></li>
                    <li><a href="dashboard-wishlist.html">Wishlist</a></li>
                </ul>
            </aside>
            <div class="dashboard-content">
                <div style="background: var(--bg-card); padding: 30px; border: 1px solid var(--glass);">
                    <h3 style="margin-bottom: 20px; color: var(--primary);">Shipping Address</h3>
                    <form id="addressForm">
                        <div class="form-group"><label>Street</label><input type="text" id="setAddress" required></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                            <div class="form-group"><label>City</label><input type="text" id="setCity" required></div>
                            <div class="form-group"><label>Pincode</label><input type="text" id="setPincode" required></div>
                        </div>
                        <button type="submit" class="cta-button">Save Address</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const addr = JSON.parse(localStorage.getItem('userAddress')) || {};
        if (addr.street) { 
            document.getElementById('setAddress').value = addr.street;
            document.getElementById('setCity').value = addr.city;
            document.getElementById('setPincode').value = addr.pincode;
        }
        document.getElementById('addressForm').addEventListener('submit', (e) => {
            e.preventDefault();
            localStorage.setItem('userAddress', JSON.stringify({
                street: document.getElementById('setAddress').value,
                city: document.getElementById('setCity').value,
                pincode: document.getElementById('setPincode').value
            }));
            alert("Address saved!");
        });
    </script>
</body>
</html>

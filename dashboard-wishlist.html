<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search wishlist..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="cart.html">Cart</a></li>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 100px;">
        <div class="dashboard-grid">
            <aside class="sidebar-nav">
                <ul>
                    <li><a href="dashboard-orders.html">My Orders</a></li>
                    <li class="active"><a href="dashboard-wishlist.html">Wishlist</a></li>
                    <li><a href="dashboard-address.html">Shipping Address</a></li>
                    <li><a href="dashboard-settings.html">Account Settings</a></li>
                </ul>
            </aside>

            <div class="dashboard-content">
                <div class="dashboard-header">
                    <h2>My Wishlist</h2>
                </div>
                
                <div id="wishlistContainer" class="product-grid" style="grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));">
                    <!-- Wishlist items will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <footer style="margin-top: 50px;">
        <div class="footer-bottom">
            &copy; 2026 YJ Menswear. All Rights Reserved.
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadWishlist();
        });

        function loadWishlist() {
            const wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            const container = document.getElementById('wishlistContainer');

            if (wishlist.length === 0) {
                container.innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: var(--text-muted);">
                        <p>Your wishlist is empty.</p>
                        <a href="perfumes.html" class="cta-button" style="display: inline-block; margin-top: 20px;">Browse Products</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = wishlist.map(item => `
                <div class="product-card">
                    <div class="product-img" style="height: 200px;">
                        <img src="${item.image}" alt="${item.name}">
                    </div>
                    <div class="product-info" style="min-height: auto;">
                        <div class="product-name" style="font-size: 0.9rem;">${item.name}</div>
                        <div class="product-price">${item.price}</div>
                        <button onclick="removeFromWishlist('${item.name}')" class="cta-button" style="width: 100%; margin-top: 10px; background: transparent; color: #ff4757; border-color: #ff4757;">Remove</button>
                    </div>
                </div>
            `).join('');
        }

        function removeFromWishlist(name) {
            let wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
            wishlist = wishlist.filter(item => item.name !== name);
            localStorage.setItem('wishlist', JSON.stringify(wishlist));
            loadWishlist();
        }

        // Global logout will be used from script.js
    </script>
</body>
</html>

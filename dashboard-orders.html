<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="dashboard-grid">
            <aside class="sidebar-nav">
                <ul>
                    <li class="active"><a href="dashboard-orders.html">My Orders</a></li>
                    <li><a href="dashboard-settings.html">Account Settings</a></li>
                    <li><a href="dashboard-address.html">Shipping Address</a></li>
                    <li><a href="dashboard-wishlist.html">Wishlist</a></li>
                </ul>
            </aside>
            <div class="dashboard-content">
                <div style="background: var(--bg-card); padding: 30px; border: 1px solid var(--glass);">
                    <h3 style="margin-bottom: 20px; color: var(--primary);">Order History</h3>
                    <div id="orderContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        const orders = JSON.parse(localStorage.getItem('userOrders')) || [];
        const container = document.getElementById('orderContainer');
        if (orders.length === 0) {
            container.innerHTML = "<p>No orders yet.</p>";
        } else {
            let html = "<table class='order-history-table'><thead><tr><th>ID</th><th>Date</th><th>Item</th><th>Price</th></tr></thead><tbody>";
            orders.reverse().forEach(o => {
                html += `<tr><td>${o.id}</td><td>${o.date}</td><td>${o.product}</td><td>${o.total}</td></tr>`;
            });
            html += "</tbody></table>";
            container.innerHTML = html;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search products..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="form-container">
            <div class="section-title">
                <h2>Customer Login</h2>
                <div class="line"></div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="loginPassword" placeholder="Enter Password" required style="padding-right: 40px;">
                        <span id="toggleLoginPassword" onclick="togglePassword('loginPassword', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">👁️</span>
                    </div>
                    <div style="text-align: right; margin-top: 5px;">
                        <a href="#" onclick="forgotPassword()" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 20px;">Login</button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Don't have an account? <a href="register.html" style="color: var(--primary);">Register Now</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        function forgotPassword() {
            const userEmail = prompt("Please enter your registered email address:");
            if (userEmail) {
                const subject = encodeURIComponent("Password Reset Request - YJ Menswear");
                const body = encodeURIComponent(`Hello YJ Menswear Support,\n\nI have forgotten my password for the account registered with: ${userEmail}.\n\nPlease assist me with a password reset.\n\nThank you.`);
                window.location.href = `mailto:yashshah2140@gmail.com?subject=${subject}&body=${body}`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Checking...";
            submitBtn.disabled = true;

            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                try {
                    if (typeof getData !== 'undefined') {
                        const fbUsers = await getData('users');
                        if (fbUsers) {
                            const fbArray = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                            const validFbUsers = fbArray.filter(u => u && u.email);
                            
                            // Merge local and cloud users
                            validFbUsers.forEach(cloudUser => {
                                if (!users.find(u => u.email === cloudUser.email)) {
                                    users.push(cloudUser);
                                }
                            });
                            localStorage.setItem('users', JSON.stringify(users));
                        }
                    }
                } catch (fbErr) {
                    console.warn("Firebase fetch failed, using local storage", fbErr);
                }

                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    window.location.href = redirect ? decodeURIComponent(redirect) : 'dashboard-orders.html';
                } else {
                    if (typeof showToast !== 'undefined') {
                        showToast("Invalid email or password.");
                    } else {
                        alert("Invalid email or password.");
                    }
                    submitBtn.innerText = "Login";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                if (typeof showToast !== 'undefined') {
                    showToast("Connection error.");
                } else {
                    alert("Connection error.");
                }
                submitBtn.innerText = "Login";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

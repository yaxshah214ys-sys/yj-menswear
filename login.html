<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="form-container">
            <div class="section-title">
                <h2>Customer Login</h2>
                <div class="line"></div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="yashshah2140@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                    <div style="text-align: right; margin-top: 5px;">
                        <a href="#" onclick="forgotPassword()" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 20px;">Login</button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Don't have an account? <a href="register.html" style="color: var(--primary);">Register Now</a>
                </p>
            </form>
        </div>
    </main>

    <script>
        function forgotPassword() {
            const userEmail = prompt("Please enter your registered email address:");
            if (userEmail) {
                const subject = encodeURIComponent("Password Reset Request - YJ Menswear");
                const body = encodeURIComponent(`Hello YJ Menswear Support,\n\nI have forgotten my password for the account registered with: ${userEmail}.\n\nPlease assist me with a password reset.\n\nThank you.`);
                window.location.href = `mailto:yashshah2140@gmail.com?subject=${subject}&body=${body}`;
            }
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const storedUser = JSON.parse(localStorage.getItem('registeredUser'));

            if (storedUser && storedUser.email === email && storedUser.password === password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', storedUser.name);
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                window.location.href = redirect ? decodeURIComponent(redirect) : 'dashboard-orders.html';
            } else {
                alert("Invalid email or password. Please register first.");
            }
        });
    </script>
</body>
</html>

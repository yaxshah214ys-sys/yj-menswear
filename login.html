<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search products..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="form-container">
            <div class="section-title">
                <h2>Customer Login</h2>
                <div class="line"></div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="loginPassword" placeholder="Enter Password" required style="padding-right: 40px;">
                        <span id="toggleLoginPassword" onclick="togglePassword('loginPassword', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">👁️</span>
                    </div>
                    <div style="text-align: right; margin-top: 5px;">
                        <a href="#" onclick="forgotPassword()" style="font-size: 0.8rem; color: var(--primary); text-decoration: none;">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 20px;">Login</button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Don't have an account? <a href="register.html" style="color: var(--primary);">Register Now</a>
                </p>
            </form>
        </div>
    </main>

    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center;">
        <div class="form-container" style="background: var(--bg-card); width: 90%; max-width: 400px; padding: 30px; border-radius: 8px; position: relative;">
            <span onclick="closeForgotModal()" style="position: absolute; right: 15px; top: 15px; cursor: pointer; font-size: 1.2rem; color: var(--text-muted);">✖</span>
            <h3 style="color: var(--primary); margin-bottom: 20px;">Reset Password</h3>
            
            <div id="step1">
                <p style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-muted);">Enter your registered email address.</p>
                <div class="form-group">
                    <input type="email" id="resetEmail" placeholder="your@email.com">
                </div>
                <button type="button" class="cta-button" style="width: 100%; padding: 10px;" onclick="checkResetEmail()">Next</button>
            </div>

            <div id="step2" style="display: none;">
                <p id="securityQuestionText" style="font-size: 0.9rem; margin-bottom: 15px; color: var(--primary); font-weight: bold;"></p>
                <div class="form-group">
                    <input type="text" id="resetAnswer" placeholder="Your secret answer">
                </div>
                <button type="button" class="cta-button" style="width: 100%; padding: 10px;" onclick="verifySecurityAnswer()">Verify</button>
            </div>

            <div id="step3" style="display: none;">
                <p style="font-size: 0.9rem; margin-bottom: 15px; color: var(--text-muted);">Create a new password.</p>
                <div class="form-group">
                    <input type="password" id="newPassword" placeholder="New Password">
                </div>
                <button type="button" class="cta-button" style="width: 100%; padding: 10px;" onclick="saveNewPassword()">Save Password</button>
            </div>
            
            <p id="resetMessage" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; text-align: center; display: none;"></p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        let resetUserObj = null;

        function forgotPassword() {
            document.getElementById('forgotPasswordModal').style.display = 'flex';
            document.getElementById('step1').style.display = 'block';
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step3').style.display = 'none';
            document.getElementById('resetMessage').style.display = 'none';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetAnswer').value = '';
            document.getElementById('newPassword').value = '';
        }

        function closeForgotModal() {
            document.getElementById('forgotPasswordModal').style.display = 'none';
        }

        async function checkResetEmail() {
            const email = document.getElementById('resetEmail').value.trim();
            const msg = document.getElementById('resetMessage');
            if (!email) return;
            
            let users = JSON.parse(localStorage.getItem('users') || '[]');
            try {
                if (typeof getData !== 'undefined') {
                    const fbUsers = await getData('users');
                    if (fbUsers) {
                        const fbArray = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                        const validFbUsers = fbArray.filter(u => u && u.email);
                        validFbUsers.forEach(cloudUser => {
                            if (!users.find(u => u.email === cloudUser.email)) {
                                users.push(cloudUser);
                            }
                        });
                        localStorage.setItem('users', JSON.stringify(users));
                    }
                }
            } catch(e){}

            resetUserObj = users.find(u => u.email === email);
            if (!resetUserObj) {
                msg.innerText = "Email not found in our system!";
                msg.style.color = '#ff4d4d';
                msg.style.display = 'block';
                return;
            }

            if (!resetUserObj.securityQuestion || !resetUserObj.securityAnswer) {
                msg.innerText = "No security question set for this account. Cannot reset password automatically.";
                msg.style.color = '#ff4d4d';
                msg.style.display = 'block';
                return;
            }

            msg.style.display = 'none';
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
            
            const questions = {
                'pet': "What is your first pet's name?",
                'school': "What was your first school's name?",
                'city': "In what city were you born?",
                'food': "What is your favorite food?"
            };
            document.getElementById('securityQuestionText').innerText = questions[resetUserObj.securityQuestion] || "Answer your secret question:";
        }

        function verifySecurityAnswer() {
            const answer = document.getElementById('resetAnswer').value.toLowerCase().trim();
            const msg = document.getElementById('resetMessage');
            
            if (answer === resetUserObj.securityAnswer.toLowerCase()) {
                msg.style.display = 'none';
                document.getElementById('step2').style.display = 'none';
                document.getElementById('step3').style.display = 'block';
            } else {
                msg.innerText = "Incorrect answer! Please try again.";
                msg.style.color = '#ff4d4d';
                msg.style.display = 'block';
            }
        }

        async function saveNewPassword() {
            const newPass = document.getElementById('newPassword').value;
            const msg = document.getElementById('resetMessage');
            
            const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(newPass)) {
                msg.innerText = "Password too weak! (Min 8 chars, 1 Upper, 1 Number, 1 Special)";
                msg.style.color = '#ff4d4d';
                msg.style.display = 'block';
                return;
            }

            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const index = users.findIndex(u => u.email === resetUserObj.email);
            if (index !== -1) {
                users[index].password = newPass;
                localStorage.setItem('users', JSON.stringify(users));
                
                try {
                    if (typeof syncData !== 'undefined') {
                        await syncData('users', users);
                    }
                } catch(e){}

                msg.innerText = "Password changed successfully! You can now login.";
                msg.style.color = '#4caf50';
                msg.style.display = 'block';
                
                setTimeout(() => {
                    closeForgotModal();
                    document.getElementById('loginEmail').value = resetUserObj.email;
                    document.getElementById('loginPassword').value = '';
                }, 2000);
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Checking...";
            submitBtn.disabled = true;

            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                try {
                    if (typeof getData !== 'undefined') {
                        const fbUsers = await getData('users');
                        if (fbUsers) {
                            const fbArray = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                            const validFbUsers = fbArray.filter(u => u && u.email);
                            
                            // Merge local and cloud users
                            validFbUsers.forEach(cloudUser => {
                                if (!users.find(u => u.email === cloudUser.email)) {
                                    users.push(cloudUser);
                                }
                            });
                            localStorage.setItem('users', JSON.stringify(users));
                        }
                    }
                } catch (fbErr) {
                    console.warn("Firebase fetch failed, using local storage", fbErr);
                }

                const user = users.find(u => u.email === email && u.password === password);

                if (user) {
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('currentUser', JSON.stringify(user));
                    const urlParams = new URLSearchParams(window.location.search);
                    const redirect = urlParams.get('redirect');
                    window.location.href = redirect ? decodeURIComponent(redirect) : 'dashboard-orders.html';
                } else {
                    if (typeof showToast !== 'undefined') {
                        showToast("Invalid email or password.");
                    } else {
                        alert("Invalid email or password.");
                    }
                    submitBtn.innerText = "Login";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                if (typeof showToast !== 'undefined') {
                    showToast("Connection error.");
                } else {
                    alert("Connection error.");
                }
                submitBtn.innerText = "Login";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

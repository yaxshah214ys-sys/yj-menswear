<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search products..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="form-container">
            <div class="section-title">
                <h2>Create Account</h2>
                <div class="line"></div>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Enter Your Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="Enter Your Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" id="regPassword" placeholder="Create Password" required style="padding-right: 40px;">
                        <span id="toggleRegPassword" onclick="togglePassword('regPassword', this)" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">👁️</span>
                    </div>
                    <small style="color: var(--text-muted); font-size: 0.75rem;">Min 8 chars, 1 Uppercase, 1 Number, 1 Special Char</small>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 20px;">Register</button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary);">Login Here</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const submitBtn = e.target.querySelector('button');
            submitBtn.innerText = "Registering...";
            submitBtn.disabled = true;

            const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                if (typeof showToast !== 'undefined') {
                    showToast("Password too weak!");
                } else {
                    alert("Password too weak!");
                }
                submitBtn.innerText = "Register";
                submitBtn.disabled = false;
                return;
            }

            try {
                let users = JSON.parse(localStorage.getItem('users') || '[]');
                try {
                    // Fetch latest from Firebase
                    if (typeof getData !== 'undefined') {
                        const fbUsers = await getData('users');
                        if (fbUsers) {
                            users = Array.isArray(fbUsers) ? fbUsers : Object.values(fbUsers);
                            users = users.filter(u => u); // remove nulls
                            localStorage.setItem('users', JSON.stringify(users));
                        }
                    }
                } catch (fbErr) {
                    console.warn("Firebase fetch failed", fbErr);
                }

                const userExists = users.some(u => u.email === email);
                
                if (userExists) {
                    if (typeof showToast !== 'undefined') {
                        showToast("Email already registered!");
                    } else {
                        alert("Email already registered!");
                    }
                    window.location.href = 'login.html';
                    return;
                }

                const newUser = { name, email, password };
                users.push(newUser);
                localStorage.setItem('users', JSON.stringify(users));
                
                try {
                    // Sync with Firebase Cloud
                    if (typeof syncData !== 'undefined') {
                        await syncData('users', users);
                    }
                } catch (fbErr) {
                    console.warn("Firebase sync failed", fbErr);
                }

                if (typeof showToast !== 'undefined') {
                    showToast("Registration successful!");
                } else {
                    alert("Registration successful!");
                }
                window.location.href = 'login.html';
            } catch (err) {
                console.error(err);
                if (typeof showToast !== 'undefined') {
                    showToast("Registration failed.");
                } else {
                    alert("Registration failed.");
                }
                submitBtn.innerText = "Register";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" placeholder="Search products..." class="search-input" id="globalSearch">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div class="form-container">
            <div class="section-title">
                <h2>Create Account</h2>
                <div class="line"></div>
            </div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="regName" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="regEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="regPassword" placeholder="e.g. Yash@123" required>
                    <small style="color: var(--text-muted); font-size: 0.75rem;">Min 8 chars, 1 Uppercase, 1 Number, 1 Special Char</small>
                </div>
                <button type="submit" class="cta-button" style="width: 100%; margin-top: 20px;">Register</button>
                <p style="text-align: center; margin-top: 20px; color: var(--text-muted);">
                    Already have an account? <a href="login.html" style="color: var(--primary);">Login Here</a>
                </p>
            </form>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            const passwordRegex = /^(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
            if (!passwordRegex.test(password)) {
                alert("Password too weak! Min 8 chars, 1 Uppercase, 1 Number, 1 Special Char.");
                return;
            }

            let users = JSON.parse(localStorage.getItem('users') || '[]');
            const userExists = users.some(u => u.email === email);
            
            if (userExists) {
                alert("This email is already registered!");
                return;
            }

            const newUser = { name, email, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            
            // Sync with Firebase
            if (typeof syncData !== 'undefined') {
                syncData('users', users);
            }

            alert("Registration successful! Please login.");
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>

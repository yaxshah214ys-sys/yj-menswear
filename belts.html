<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belts | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div style="margin-bottom: 20px;">
            <a href="index.html#categories" class="cta-button" style="padding: 8px 15px; font-size: 0.8rem;">&larr; Back to Categories</a>
        </div>
        <div class="section-title">
            <h2>Premium Leather Belts</h2>
            <div class="line"></div>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">
                    <img src="images/black_leather_belt_1777199590136.png" alt="Black Belt">
                </div>
                <div class="product-info">
                    <div class="product-brand">YJ Classic</div>
                    <div class="product-name">Full Grain Black</div>
                    <div class="product-price">₹1,499</div>
                    <a href="checkout.html?product=Full Grain Black Belt&price=₹1,499" class="cta-button" style="display: block; margin-top: 15px; text-align: center; padding: 10px;">Buy Now</a>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="images/brown_leather_belt_1777199606144.png" alt="Brown Belt">
                </div>
                <div class="product-info">
                    <div class="product-brand">YJ Heritage</div>
                    <div class="product-name">Vintage Walnut</div>
                    <div class="product-price">₹1,699</div>
                    <a href="checkout.html?product=Vintage Walnut Belt&price=₹1,699" class="cta-button" style="display: block; margin-top: 15px; text-align: center; padding: 10px;">Buy Now</a>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="images/suede_belt_grey_1777199624586.png" alt="Grey Belt">
                </div>
                <div class="product-info">
                    <div class="product-brand">YJ Modern</div>
                    <div class="product-name">Slate Suede</div>
                    <div class="product-price">₹1,899</div>
                    <a href="checkout.html?product=Slate Suede Belt&price=₹1,899" class="cta-button" style="display: block; margin-top: 15px; text-align: center; padding: 10px;">Buy Now</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 YJ Menswear. All Rights Reserved.
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>

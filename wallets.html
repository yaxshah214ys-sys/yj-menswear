<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallets | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="dashboard-orders.html" style="color: var(--primary);">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div style="margin-bottom: 20px;">
            <a href="index.html#categories" class="cta-button" style="padding: 8px 15px; font-size: 0.8rem;">&larr; Back to Categories</a>
        </div>
        <div class="section-title">
            <h2>Luxury Leather Wallets</h2>
            <div class="line"></div>
        </div>

        <div class="product-grid">
            <div class="product-card">
                <div class="product-img">
                    <img src="images/leather_wallet_black_1777188734900.png" alt="Black Wallet">
                </div>
                <div class="product-info">
                    <div class="product-name">Midnight Noir Bifold</div>
                    <div class="product-price">₹2,499</div>
                    <a href="checkout.html?product=Midnight Noir Bifold&price=₹2,499" class="cta-button" style="display: block; margin-top: 15px; text-align: center; padding: 10px;">Buy Now</a>
                </div>
            </div>
            <div class="product-card">
                <div class="product-img">
                    <img src="images/leather_wallet_tan_1777188716416.png" alt="Tan Wallet">
                </div>
                <div class="product-info">
                    <div class="product-name">Rustic Tan Slimfold</div>
                    <div class="product-price">₹1,999</div>
                    <a href="checkout.html?product=Rustic Tan Slimfold&price=₹1,999" class="cta-button" style="display: block; margin-top: 15px; text-align: center; padding: 10px;">Buy Now</a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 YJ Menswear. All Rights Reserved.
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>

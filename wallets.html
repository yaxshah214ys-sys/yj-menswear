<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallets | YJ Menswear</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header id="header" class="scrolled">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Menswear</a></div>
        <nav>
            <ul>
                <li><a href="cart.html" style="color: var(--primary);">Cart</a></li>
                <li><a href="dashboard-orders.html">Account</a></li>
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 80px;">
        <div style="margin-bottom: 20px;">
            <a href="index.html#categories" class="cta-button" style="padding: 8px 15px; font-size: 0.8rem;">&larr; Back to Categories</a>
        </div>
        <div class="section-title">
            <h2>Luxury Leather Wallets</h2>
            <div class="line"></div>
        </div>

        <div class="product-grid">
            <!-- Black Wallet -->
            <div class="product-card" onclick="location.href='product-detail.html?brand=YJ Luxury&product=Midnight Noir Bifold&price=₹2,499&imgBase=images/wallet_black&ext=png&desc=A classic bifold wallet crafted from premium full-grain leather. Features 8 card slots, dual currency compartments, and a sleek minimalist profile.'">
                <div class="product-img slider-container">
                    <img src="images/wallet_black.png" class="slider-img active" alt="Black Wallet 1">
                    <img src="images/wallet_black_2.png" class="slider-img" alt="Black Wallet 2">
                    <img src="images/wallet_black_3.png" class="slider-img" alt="Black Wallet 3">
                    <div class="slider-dots">
                        <span class="dot active" onclick="event.stopPropagation(); setSlide(this, 0)"></span>
                        <span class="dot" onclick="event.stopPropagation(); setSlide(this, 1)"></span>
                        <span class="dot" onclick="event.stopPropagation(); setSlide(this, 2)"></span>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-name">Midnight Noir Bifold</div>
                    <div class="product-price">₹2,499</div>
                    <button class="cta-button" style="display: block; width: 100%; margin-top: 15px; text-align: center; padding: 10px; background: transparent; color: var(--primary);">View Details</button>
                </div>
            </div>

            <!-- Tan Wallet -->
            <div class="product-card" onclick="location.href='product-detail.html?brand=YJ Luxury&product=Rustic Tan Slimfold&price=₹1,999&imgBase=images/wallet_tan&ext=png&desc=Elegant and functional. This rustic tan slimfold is perfect for the modern man. Hand-stitched for durability with a soft, natural leather finish.'">
                <div class="product-img slider-container">
                    <img src="images/wallet_tan.png" class="slider-img active" alt="Tan Wallet 1">
                    <img src="images/wallet_tan_2.png" class="slider-img" alt="Tan Wallet 2">
                    <img src="images/wallet_tan_3.png" class="slider-img" alt="Tan Wallet 3">
                    <div class="slider-dots">
                        <span class="dot active" onclick="event.stopPropagation(); setSlide(this, 0)"></span>
                        <span class="dot" onclick="event.stopPropagation(); setSlide(this, 1)"></span>
                        <span class="dot" onclick="event.stopPropagation(); setSlide(this, 2)"></span>
                    </div>
                </div>
                <div class="product-info">
                    <div class="product-name">Rustic Tan Slimfold</div>
                    <div class="product-price">₹1,999</div>
                    <button class="cta-button" style="display: block; width: 100%; margin-top: 15px; text-align: center; padding: 10px; background: transparent; color: var(--primary);">View Details</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-bottom">
            &copy; 2026 YJ Menswear. All Rights Reserved.
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>

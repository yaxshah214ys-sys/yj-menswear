<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Inventory | YJ Menswear Admin</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-form {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--glass);
            margin-bottom: 40px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass);
            border-radius: 8px;
            color: #fff;
            outline: none;
        }
        .form-group input:focus {
            border-color: var(--primary);
        }
        .inventory-table th, .inventory-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid var(--glass);
        }
        .img-preview {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">YJ Inventory</a></div>
        <nav>
            <ul>
                <li><a href="admin-dashboard.html">Dashboard</a></li>
                <li><a href="index.html">Store Front</a></li>
            </ul>
        </nav>
    </header>

    <main class="section" style="margin-top: 100px;">
        <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h2>Product Inventory</h2>
            <button onclick="toggleForm()" class="cta-button" id="toggleBtn" style="padding: 10px 20px; font-size: 0.9rem; background: var(--primary); border-color: var(--primary); color: #000;">+ Add New Product</button>
        </div>

        <!-- Add/Edit Product Form -->
        <div id="productForm" class="product-form" style="display: none;">
            <h3 id="formTitle" style="margin-bottom: 20px;">Add New Product</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Premium Leather Wallet">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory">
                        <option value="wallets">Wallets</option>
                        <option value="belts">Belts</option>
                        <option value="watches">Watches</option>
                        <option value="sunglasses">Sunglasses</option>
                        <option value="perfumes">Perfumes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Offer Price (₹)</label>
                    <input type="number" id="pPrice" placeholder="e.g. 1499">
                </div>
                <div class="form-group">
                    <label>Original Price (MRP) (₹)</label>
                    <input type="number" id="pOldPrice" placeholder="e.g. 2999">
                </div>
                <div class="form-group">
                    <label>Image URL</label>
                    <input type="text" id="pImg" placeholder="images/product-name.jpg" oninput="updatePreview(this.value)">
                    <div id="livePreview" style="margin-top: 15px; width: 100%; height: 150px; background: rgba(255,255,255,0.02); border: 1px dashed var(--glass); border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden;">
                        <span style="color: var(--text-muted); font-size: 0.8rem;">Image Preview</span>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button onclick="saveProduct()" class="cta-button" style="padding: 12px 30px; font-size: 0.9rem; background: var(--primary); border-color: var(--primary); color: #000;">Save Product</button>
                <button onclick="toggleForm()" class="tab-btn" style="padding: 12px 30px;">Cancel</button>
            </div>
        </div>

        <!-- Inventory List -->
        <div style="background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--glass); overflow-x: auto;">
            <table class="inventory-table" style="width: 100%; min-width: 800px;">
                <thead>
                    <tr style="color: var(--primary); font-size: 0.85rem; text-transform: uppercase;">
                        <th>Image</th>
                        <th>Product Name</th>
                        <th>Category</th>
                        <th>Offer Price</th>
                        <th>Original (MRP)</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryList">
                    <tr><td colspan="5" style="text-align: center; padding: 30px;">Loading inventory...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="script.js"></script>
    <script>
        // Security check
        const currentUser = JSON.parse(localStorage.getItem('currentUser'));
        if (!currentUser || currentUser.email !== 'yashshah2140@gmail.com') {
            window.location.href = "index.html";
        }

        let editingIndex = -1;
        let allProducts = [];

        function toggleForm() {
            const form = document.getElementById('productForm');
            const btn = document.getElementById('toggleBtn');
            if (form.style.display === 'none') {
                form.style.display = 'block';
                btn.innerText = '✕ Close Form';
            } else {
                form.style.display = 'none';
                btn.innerText = '+ Add New Product';
                resetForm();
            }
        }

        function updatePreview(url) {
            const container = document.getElementById('livePreview');
            if (!url) {
                container.innerHTML = '<span style="color: var(--text-muted); font-size: 0.8rem;">Image Preview</span>';
                return;
            }
            container.innerHTML = `<img src="${url}" style="max-width: 100%; max-height: 100%; object-fit: contain;" onerror="this.parentElement.innerHTML='<span style='color: #ff4d4d; font-size: 0.8rem;'>Invalid Image URL</span>'">`;
        }

        function resetForm() {
            document.getElementById('pName').value = '';
            document.getElementById('pPrice').value = '';
            document.getElementById('pOldPrice').value = '';
            document.getElementById('pImg').value = '';
            updatePreview('');
            document.getElementById('formTitle').innerText = 'Add New Product';
            editingIndex = -1;
        }

        async function loadInventory() {
            const container = document.getElementById('inventoryList');
            try {
                const data = await getData('inventory');
                allProducts = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
                
                if (allProducts.length === 0) {
                    container.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 20px;">No products in inventory.</td></tr>';
                    return;
                }

                container.innerHTML = allProducts.map((p, i) => `
                    <tr>
                        <td><img src="${p.img}" class="img-preview" onerror="this.src='https://via.placeholder.com/50'"></td>
                        <td style="font-weight: 600;">${p.name}</td>
                        <td style="text-transform: capitalize;">${p.category}</td>
                        <td style="color: var(--primary); font-weight: 700;">₹${parseFloat(p.price).toLocaleString('en-IN')}</td>
                        <td style="color: var(--text-muted); text-decoration: line-through;">₹${p.oldPrice ? parseFloat(p.oldPrice).toLocaleString('en-IN') : '0'}</td>
                        <td>
                            <button onclick="editProduct(${i})" style="color: var(--primary); background: none; border: none; cursor: pointer; margin-right: 15px;">Edit</button>
                            <button onclick="deleteProduct(${i})" style="color: #ff4d4d; background: none; border: none; cursor: pointer;">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (e) {
                container.innerHTML = '<tr><td colspan="6" style="text-align: center; color: #ff4d4d;">Failed to load inventory.</td></tr>';
            }
        }

        async function saveProduct() {
            const name = document.getElementById('pName').value;
            const category = document.getElementById('pCategory').value;
            const price = document.getElementById('pPrice').value;
            const oldPrice = document.getElementById('pOldPrice').value;
            const img = document.getElementById('pImg').value;

            if (!name || !price || !img) {
                alert("Please fill all fields!");
                return;
            }

            const product = { name, category, price, oldPrice, img, id: Date.now() };

            if (editingIndex > -1) {
                allProducts[editingIndex] = product;
            } else {
                allProducts.push(product);
            }

            try {
                await syncData('inventory', allProducts);
                showToast(editingIndex > -1 ? "Product Updated!" : "Product Added!");
                toggleForm();
                loadInventory();
            } catch (e) {
                alert("Error saving to cloud.");
            }
        }

        function editProduct(index) {
            const p = allProducts[index];
            document.getElementById('pName').value = p.name;
            document.getElementById('pCategory').value = p.category;
            document.getElementById('pPrice').value = p.price;
            document.getElementById('pOldPrice').value = p.oldPrice || '';
            document.getElementById('pImg').value = p.img;
            updatePreview(p.img);
            
            document.getElementById('formTitle').innerText = 'Edit Product';
            editingIndex = index;
            
            const form = document.getElementById('productForm');
            if (form.style.display === 'none') toggleForm();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteProduct(index) {
            if (confirm("Delete this product?")) {
                allProducts.splice(index, 1);
                try {
                    await syncData('inventory', allProducts);
                    showToast("Product Deleted");
                    loadInventory();
                } catch (e) {
                    alert("Error deleting from cloud.");
                }
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
